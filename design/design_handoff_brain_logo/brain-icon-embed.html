<title>Animated brain logo — embed</title>
<style>
  body{margin:0;background:#0a0a0f;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:ui-sans-serif,system-ui,sans-serif;color:#8a8a99}
  /* === paste .brain-logo (its two canvases) + the <script> below into your site === */
  .brain-logo{
    --fluid:#5046e6;   /* purple fill (the "Read the blog" button colour) */
    --flow:3s;         /* fill duration on hover-in */
    --drain:1.4s;      /* empty duration on hover-out */
    position:relative; display:inline-block; width:56px; height:56px; cursor:pointer;
  }
  .brain-logo canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .brain-logo .fluid{filter:drop-shadow(0 0 4px var(--fluid))}
</style>
</head>

    var n=ink.length, idx=new Int32Array(n), dn=new Float32Array(n), al=new Float32Array(n);

    var fctx=fluid.getContext('2d'), fimg=fctx.createImageData(R,R), fd=fimg.data;
    function paintColor(){var c=hex2rgb(getComputedStyle(host).getPropertyValue('--fluid'));for(var k=0;k<n;k++){var o=idx[k];fd[o]=c[0];fd[o+1]=c[1];fd[o+2]=c[2];}}
    paintColor();

    var gt=0,dir=0,raf=null,last=null;
    function render0(){
      if(gt<=0.0005){for(var k=0;k<n;k++)fd[idx[k]+3]=0;}
      else for(var k=0;k<n;k++){var f=(gt*(1+BAND)-dn[k])/BAND;var rev=f<=0?0:(f>=1?1:f);fd[idx[k]+3]=(rev*al[k]*255)|0;}
      fctx.putImageData(fimg,0,0);
    }
    function tick(){var now=performance.now();if(last==null)last=now;var dt=(now-last)/1000;last=now;if(dir>0)gt=Math.min(1,gt+dt/flow);else if(dir<0)gt=Math.max(0,gt-dt/drain);render0();var settled=(dir>0&&gt>=1)||(dir<0&&gt<=0);if(!settled)raf=requestAnimationFrame(tick);else raf=null;}
    function kick(d){dir=d;last=performance.now();if(!raf)raf=requestAnimationFrame(tick);}
    render0();
    host.addEventListener('mouseenter',function(){kick(1);});
    host.addEventListener('mouseleave',function(){kick(-1);});
    host.addEventListener('focus',function(){kick(1);});
    host.addEventListener('blur',function(){kick(-1);});
  }
  document.querySelectorAll('.brain-logo').forEach(mount);
})();
</script>
